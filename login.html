<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs (compat build — simplest to use with plain <script>) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg-0:#08080a;
    --bg-1:#101013;
    --surface-1:#15151a;
    --surface-2:#1c1c22;
    --surface-glass: rgba(255,255,255,0.035);
    --border-hair: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --grey-1:#9a9aa1;
    --grey-2:#6e6e76;
    --grey-3:#46464d;
    --text-0:#f1f1f3;
    --text-1:#b9b9c0;
    --text-2:#7c7c84;
    --accent:#8c97a3;
    --accent-dim: rgba(140,151,163,0.18);
    --danger:#c97a72;
    --danger-dim: rgba(201,122,114,0.14);
    --success:#7fae8e;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    min-height:100vh;
    background:var(--bg-0);
    font-family:var(--font-body);
    color:var(--text-0);
  }

  body{
    position:relative;
    overflow-x:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .grid-bg{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, black 0%, transparent 75%);
    z-index:0;
  }

  .glow{
    position:fixed;
    width:560px;
    height:560px;
    top:-180px;
    left:50%;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(140,151,163,0.10), transparent 70%);
    z-index:0;
    pointer-events:none;
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
    margin-bottom:36px;
  }

  .brand-mark{
    width:34px;
    height:34px;
    border-radius:9px;
    background:linear-gradient(155deg, var(--surface-2), var(--surface-1));
    border:0.5px solid var(--border-strong);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .brand-mark svg{ width:16px; height:16px; }

  .brand-name{
    font-family:var(--font-display);
    font-weight:500;
    font-size:18px;
    letter-spacing:0.01em;
  }

  .panel{
    background:var(--surface-glass);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border:0.5px solid var(--border-hair);
    border-radius:var(--radius-lg);
    padding:38px 34px 32px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 24px 60px -20px rgba(0,0,0,0.6);
  }

  .panel-head{
    text-align:center;
    margin-bottom:30px;
  }

  .panel-head h1{
    font-family:var(--font-display);
    font-size:21px;
    font-weight:500;
    margin:0 0 6px;
    color:var(--text-0);
  }

  .panel-head p{
    font-size:13.5px;
    color:var(--text-2);
    margin:0;
    line-height:1.6;
  }

  .stage{ display:block; }
  .stage.hidden{ display:none; }

  .field-label{
    display:block;
    font-size:12px;
    color:var(--text-1);
    margin-bottom:9px;
    letter-spacing:0.01em;
  }

  .input-row{
    position:relative;
    margin-bottom:20px;
  }

  .input-row input[type="email"]{
    width:100%;
    background:rgba(255,255,255,0.025);
    border:0.5px solid var(--border-hair);
    border-radius:var(--radius-sm);
    padding:13px 14px;
    font-size:14.5px;
    color:var(--text-0);
    font-family:var(--font-body);
    outline:none;
    transition:border-color .15s ease, background .15s ease;
  }

  .input-row input[type="email"]::placeholder{ color:var(--text-2); }

  .input-row input[type="email"]:focus{
    border-color:var(--border-strong);
    background:rgba(255,255,255,0.045);
  }

  .input-row input.error{ border-color:var(--danger); }

  .btn-primary{
    width:100%;
    padding:13px 0;
    border-radius:var(--radius-sm);
    border:0.5px solid var(--border-strong);
    background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.025));
    color:var(--text-0);
    font-family:var(--font-body);
    font-size:14px;
    font-weight:500;
    letter-spacing:0.01em;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
  }

  .btn-primary:hover{
    border-color:rgba(255,255,255,0.28);
    background:linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
  }

  .btn-primary:active{ transform:scale(0.985); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .status-msg{
    text-align:center;
    font-size:13px;
    margin-bottom:18px;
    line-height:1.6;
    min-height:0;
  }
  .status-msg.error{ color:var(--danger); }
  .status-msg.success{ color:var(--success); }
  .status-msg.hidden{ display:none; }

  .sent-icon{
    width:54px; height:54px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    border:0.5px solid var(--border-hair);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px;
  }
  .sent-icon svg{ width:24px; height:24px; color:var(--accent); }

  .back-link{
    display:block;
    text-align:center;
    margin-top:22px;
    font-size:12.5px;
    color:var(--text-2);
    cursor:pointer;
  }

  .back-link:hover{ color:var(--text-1); }

  .footnote{
    text-align:center;
    margin-top:22px;
    font-size:11.5px;
    color:var(--grey-3);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }

  .footnote svg{ width:11px; height:11px; opacity:0.7; }

  .spinner{
    width:14px; height:14px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.25);
    border-top-color:var(--text-0);
    display:inline-block;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-right:7px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  @media (max-width:420px){
    .panel{ padding:30px 22px 26px; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<div class="wrap">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e8e8ea" stroke-width="1.6"><path d="M12 2L4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4z"/></svg>
    </div>
    <div class="brand-name">Vault</div>
  </div>

  <div class="panel">

    <!-- STAGE 1: enter email -->
    <div class="stage" id="stage-email">
      <div class="panel-head">
        <h1>Sign in</h1>
        <p>No passwords. We'll email you a secure sign-in link.</p>
      </div>

      <div class="status-msg hidden" id="email-status"></div>

      <label class="field-label" for="email-input">Email address</label>
      <div class="input-row">
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
      </div>

      <button class="btn-primary" id="send-link-btn" onclick="handleSendLink()">Send sign-in link</button>

      <div class="footnote">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        Secured by Firebase Authentication.
      </div>
    </div>

    <!-- STAGE 2: link sent, waiting for click -->
    <div class="stage hidden" id="stage-sent">
      <div class="sent-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>
      </div>
      <div class="panel-head">
        <h1>Check your email</h1>
        <p>We sent a sign-in link to <b id="sent-email-display" style="color:var(--text-1);"></b>. Open it on this device to continue.</p>
      </div>
      <div class="back-link" onclick="goToEmailStage()">Use a different email</div>
    </div>

    <!-- STAGE 3: completing sign-in (shown if URL is a sign-in link) -->
    <div class="stage hidden" id="stage-completing">
      <div class="panel-head">
        <h1><span class="spinner"></span>Signing you in…</h1>
        <p>Verifying your link, one moment.</p>
      </div>
    </div>

  </div>
</div>

<script src="firebase-config.js"></script>
<script>
function showStage(name){
  ['stage-email','stage-sent','stage-completing'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== name);
  });
}

function setStatus(msg, type){
  const el = document.getElementById('email-status');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '') + (msg ? '' : ' hidden');
}

function isValidEmail(v){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

function handleSendLink(){
  const input = document.getElementById('email-input');
  const email = input.value.trim();

  if(!isValidEmail(email)){
    input.classList.add('error');
    setStatus('Please enter a valid email address.', 'error');
    return;
  }
  input.classList.remove('error');
  setStatus('');

  const btn = document.getElementById('send-link-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';

  sendVaultSignInLink(email)
    .then(() => {
      document.getElementById('sent-email-display').textContent = email;
      showStage('stage-sent');
    })
    .catch((err) => {
      console.error(err);
      setStatus(humanizeAuthError(err), 'error');
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Send sign-in link';
    });
}

function goToEmailStage(){
  showStage('stage-email');
}

function humanizeAuthError(err){
  const code = err && err.code;
  if(code === 'auth/invalid-email') return 'That email address looks invalid.';
  if(code === 'auth/missing-android-pkg-name') return 'Configuration error — contact support.';
  if(code === 'auth/quota-exceeded') return 'Too many attempts. Please try again later.';
  return 'Something went wrong sending the link. Please try again.';
}

/* On load: if this page was opened FROM the emailed sign-in link,
   finish the sign-in automatically and redirect to the dashboard. */
(function init(){
  if(auth.isSignInWithEmailLink(window.location.href)){
    showStage('stage-completing');
    completeVaultSignInIfPossible()
      .then((didSignIn) => {
        if(didSignIn){
          window.location.href = 'dashboard.html';
        } else {
          showStage('stage-email');
        }
      })
      .catch((err) => {
        console.error(err);
        showStage('stage-email');
        setStatus(humanizeAuthError(err) || 'That link is invalid or expired. Please request a new one.', 'error');
      });
  } else {
    // Already signed in? Skip straight to dashboard.
    auth.onAuthStateChanged((user) => {
      if(user){
        window.location.href = 'dashboard.html';
      }
    });
  }
})();

document.getElementById('email-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') handleSendLink();
});
</script>

</body>
</html>
